<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPhone 標籤掃描系統</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary: #5B6CF8;
            --primary-dark: #4757e0;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #e67e22;
            --bg: #f0f2ff;
            --card: #ffffff;
            --text: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --radius: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 40px;
            color: var(--text);
        }

        .app-header {
            text-align: center;
            padding: 20px 0 16px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.3px;
        }

        .app-header p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .progress-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            padding: 0 4px;
        }

        .progress-step {
            flex: 1;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            transition: background 0.4s ease;
        }

        .progress-step.active { background: var(--primary); }
        .progress-step.done { background: var(--success); }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 2px 12px rgba(91, 108, 248, 0.08);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
        }

        .step-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-left: 10px;
            flex: 1;
        }

        .status-badge {
            font-size: 11px;
            padding: 3px 9px;
            border-radius: 20px;
            font-weight: 600;
        }

        .status-badge.pending { background: #f0f0f0; color: #999; }
        .status-badge.processing { background: #fff8e1; color: #b8860b; }
        .status-badge.success { background: #e6f9ee; color: #1a7a3a; }
        .status-badge.error { background: #fde8e8; color: #c0392b; }

        .hint-text {
            font-size: 12px;
            color: var(--text-muted);
            background: #f8f9ff;
            border-left: 3px solid var(--primary);
            padding: 8px 12px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        .btn:active:not(:disabled) { transform: scale(0.98); }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }

        .btn-primary:disabled {
            background: #c5c9f5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f4f5ff;
            color: var(--primary);
            border: 1.5px solid #dde0ff;
        }

        .btn-secondary:hover:not(:disabled) { background: #eaecff; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover:not(:disabled) { background: #218838; }
        .btn-success:disabled { background: #a8d5b5; cursor: not-allowed; }

        .btn-row {
            display: grid;
            grid-template-columns: 1fr 44px;
            gap: 8px;
            align-items: center;
        }

        .btn-row .btn { margin-bottom: 0; }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 10px;
            background: #fde8e8;
            color: var(--danger);
            border: 1.5px solid #f5c6cb;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .btn-icon:active { transform: scale(0.95); }

        .photo-preview {
            width: 100%;
            min-height: 120px;
            background: #f8f9ff;
            border: 2px dashed var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .photo-preview.has-image {
            border-color: var(--primary);
            border-style: solid;
        }

        .photo-preview img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .photo-placeholder {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .photo-placeholder .icon { font-size: 28px; margin-bottom: 6px; }

        .loading-box {
            display: none;
            text-align: center;
            padding: 16px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 14px;
        }

        .loading-box.active { display: block; }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #dde0ff;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .data-box {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 14px;
            display: none;
        }

        .data-box.visible { display: block; }

        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            gap: 10px;
        }

        .data-item:last-child { border-bottom: none; }

        .data-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
            min-width: 50px;
        }

        .data-value-input {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            text-align: right;
            flex: 1;
            min-width: 0;
        }

        .data-value-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(91, 108, 248, 0.15);
        }

        .toast {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }

        #fileInput { display: none; }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">

    <div class="app-header">
        <h1>📱 iPhone 標籤掃描</h1>
        <p>拍攝標籤，自動提取並上傳至 Google Sheets</p>
    </div>

    <div class="progress-bar">
        <div class="progress-step" id="prog1"></div>
        <div class="progress-step" id="prog2"></div>
        <div class="progress-step" id="prog3"></div>
    </div>

    <!-- 步驟一：編號標籤 -->
    <div class="card">
        <div class="card-header">
            <div class="step-badge">1</div>
            <span class="card-title">編號標籤</span>
            <span class="status-badge pending" id="status1">待拍攝</span>
        </div>
        <div class="hint-text">📸 拍攝含有 11 位數編號與 QR Code 的標籤</div>

        <div class="photo-preview" id="preview1">
            <div class="photo-placeholder">
                <div class="icon">🏷️</div>
                <div>尚未拍攝</div>
            </div>
        </div>

        <div class="loading-box" id="loading1">
            <div class="spinner"></div>
            <div class="loading-text">正在辨識編號...</div>
            <div class="progress-label" id="loadingLabel1"></div>
        </div>

        <div class="data-box" id="data1">
            <div class="data-item">
                <span class="data-label">提取編號</span>
                <input class="data-value-input" id="field_number" type="text" placeholder="未識別，可手動輸入">
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="capturePhoto('photo1')">📷 拍攝編號標籤</button>
            <button class="btn-icon" onclick="clearPhoto('photo1')" title="清除">🗑️</button>
        </div>
    </div>

    <!-- 步驟二：規格標籤 -->
    <div class="card">
        <div class="card-header">
            <div class="step-badge">2</div>
            <span class="card-title">規格標籤</span>
            <span class="status-badge pending" id="status2">待拍攝</span>
        </div>
        <div class="hint-text">📸 拍攝含有品名、SN、IMEI 的規格標籤</div>

        <div class="photo-preview" id="preview2">
            <div class="photo-placeholder">
                <div class="icon">📋</div>
                <div>尚未拍攝</div>
            </div>
        </div>

        <div class="loading-box" id="loading2">
            <div class="spinner"></div>
            <div class="loading-text">正在辨識規格...</div>
            <div class="progress-label" id="loadingLabel2"></div>
        </div>

        <div class="data-box" id="data2">
            <div class="data-item">
                <span class="data-label">品名</span>
                <input class="data-value-input" id="field_model" type="text" placeholder="未識別，可手動輸入">
            </div>
            <div class="data-item">
                <span class="data-label">SN</span>
                <input class="data-value-input" id="field_sn" type="text" placeholder="未識別，可手動輸入">
            </div>
            <div class="data-item">
                <span class="data-label">IMEI</span>
                <input class="data-value-input" id="field_imei" type="text" placeholder="未識別，可手動輸入">
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" onclick="capturePhoto('photo2')">📷 拍攝規格標籤</button>
            <button class="btn-icon" onclick="clearPhoto('photo2')" title="清除">🗑️</button>
        </div>
    </div>

    <!-- 步驟三：提交 -->
    <div class="card">
        <div class="card-header">
            <div class="step-badge">3</div>
            <span class="card-title">提交資料</span>
            <span class="status-badge pending" id="status3">待提交</span>
        </div>

        <button class="btn btn-success" id="submitBtn" onclick="submitData()" disabled>
            ✅ 傳送資料至 Google Sheets
        </button>
        <button class="btn btn-secondary" onclick="resetAll()">🔄 重新開始</button>
    </div>

    <script>
    // ============================================================
    // 設定區：請填入您的 Google Apps Script Web App URL
    // ============================================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxJgFaqYMJ1uJMJ_ZfweIMTLVSLeANY0QW48OKF_ieg4_CbOw8Q1OzwN97W7UhaK6Tn/exec";
    // ============================================================

    const state = {
        photo1: null,
        photo2: null,
        photo1Done: false,
        photo2Done: false,
        currentCapture: null,
        isSubmitting: false
    };

    // Toast 通知
    let toastTimer = null;
    function showToast(msg, type, duration) {
        type = type || 'info';
        duration = duration || 3500;
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast show ' + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function() { el.classList.remove('show'); }, duration);
    }

    // 狀態徽章
    function setStatus(step, status) {
        const el = document.getElementById('status' + step);
        const labels = {
            pending: step === 3 ? '待提交' : '待拍攝',
            processing: '辨識中...',
            success: '✓ 完成',
            error: '✗ 失敗'
        };
        el.textContent = labels[status] || status;
        el.className = 'status-badge ' + status;
    }

    // 進度條
    function setProgress(step, status) {
        const el = document.getElementById('prog' + step);
        el.className = 'progress-step' + (status === 'done' ? ' done' : status === 'active' ? ' active' : '');
    }

    // 拍照
    function capturePhoto(photoKey) {
        state.currentCapture = photoKey;
        const input = document.getElementById('fileInput');
        input.value = '';
        input.click();
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file || !state.currentCapture) return;
        const key = state.currentCapture;
        const step = key === 'photo1' ? 1 : 2;

        const reader = new FileReader();
        reader.onload = function(ev) {
            const imgData = ev.target.result;
            state[key] = imgData;

            const preview = document.getElementById('preview' + step);
            preview.innerHTML = '<img src="' + imgData + '" alt="照片預覽">';
            preview.classList.add('has-image');

            runOCR(key, step, imgData);
        };
        reader.readAsDataURL(file);
    });

    // 圖片前處理（灰階 + 對比增強）
    function preprocessImage(dataUrl) {
        return new Promise(function(resolve) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxW = 1600;
                const scale = img.width > maxW ? maxW / img.width : 1;
                canvas.width = Math.round(img.width * scale);
                canvas.height = Math.round(img.height * scale);

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                // 灰階 + 對比增強
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    const enhanced = Math.min(255, Math.max(0, (gray - 128) * 1.4 + 128));
                    data[i] = data[i+1] = data[i+2] = enhanced;
                }
                ctx.putImageData(imageData, 0, 0);
                resolve(canvas.toDataURL('image/jpeg', 0.9));
            };
            img.src = dataUrl;
        });
    }

    // OCR 辨識
    async function runOCR(photoKey, step, imgData) {
        setStatus(step, 'processing');
        setProgress(step, 'active');
        document.getElementById('loading' + step).classList.add('active');
        document.getElementById('data' + step).classList.remove('visible');

        try {
            const processed = await preprocessImage(imgData);

            const result = await Tesseract.recognize(processed, 'eng', {
                logger: function(m) {
                    if (m.status === 'recognizing text') {
                        const pct = Math.round(m.progress * 100);
                        document.getElementById('loadingLabel' + step).textContent = pct + '%';
                    }
                },
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 :/-.',
                preserve_interword_spaces: '1'
            });

            const rawText = result.data.text;
            console.log('[OCR Step' + step + '] 原始文字：', rawText);

            if (photoKey === 'photo1') {
                parseNumberLabel(rawText);
            } else {
                parseSpecLabel(rawText);
            }

            setStatus(step, 'success');
            setProgress(step, 'done');
            document.getElementById('data' + step).classList.add('visible');
            checkSubmitReady();

        } catch (err) {
            console.error('OCR 錯誤：', err);
            showToast('辨識失敗，請重新拍攝', 'error');
            setStatus(step, 'error');
            setProgress(step, '');
            if (photoKey === 'photo1') state.photo1Done = false;
            else state.photo2Done = false;
        } finally {
            document.getElementById('loading' + step).classList.remove('active');
        }
    }

    // 解析編號標籤（照片 A）
    function parseNumberLabel(text) {
        // 優先匹配 11 位純數字
        const match = text.match(/\b(\d{11})\b/);
        if (match) {
            document.getElementById('field_number').value = match[1];
            state.photo1Done = true;
            showToast('✓ 編號已識別：' + match[1], 'success');
        } else {
            // 備用：找最長數字串
            const nums = text.match(/\d{8,}/g);
            if (nums) {
                const best = nums.sort(function(a, b) { return b.length - a.length; })[0];
                document.getElementById('field_number').value = best;
                state.photo1Done = true;
                showToast('⚠️ 識別到數字：' + best + '（請確認）', 'warning');
            } else {
                document.getElementById('field_number').value = '';
                state.photo1Done = false;
                showToast('未識別到編號，請重拍或手動輸入', 'error');
            }
        }
    }

    // 解析規格標籤（照片 B）
    function parseSpecLabel(text) {
        let allOk = true;

        // 品名：iPhone 開頭，到換行或 SN/IMEI 為止
        const modelMatch = text.match(/iPhone[\s\S]{1,80}?(?=\n|SN\s*:|IMEI\s*:|$)/i);
        if (modelMatch) {
            const model = modelMatch[0].replace(/\s+/g, ' ').trim();
            document.getElementById('field_model').value = model;
        } else {
            document.getElementById('field_model').value = '';
            allOk = false;
        }

        // SN：SN : 後方英數組合（6-20 字元）
        const snMatch = text.match(/SN\s*[:\s]\s*([A-Za-z0-9]{6,20})/i);
        if (snMatch) {
            document.getElementById('field_sn').value = snMatch[1].toUpperCase();
        } else {
            document.getElementById('field_sn').value = '';
            allOk = false;
        }

        // IMEI：IMEI : 後方 15 位數字
        const imeiMatch = text.match(/IMEI\s*[:\s]\s*(\d{15})/i);
        if (imeiMatch) {
            document.getElementById('field_imei').value = imeiMatch[1];
        } else {
            // 備用：找任意 15 位連續數字
            const numMatch = text.match(/\b(\d{15})\b/);
            if (numMatch) {
                document.getElementById('field_imei').value = numMatch[1];
            } else {
                document.getElementById('field_imei').value = '';
                allOk = false;
            }
        }

        state.photo2Done = true;

        if (allOk) {
            showToast('✓ 規格資訊已完整識別', 'success');
        } else {
            showToast('⚠️ 部分欄位未識別，請手動補充後提交', 'warning');
        }
    }

    // 檢查是否可以提交
    function checkSubmitReady() {
        const n = document.getElementById('field_number').value.trim();
        const s = document.getElementById('field_sn').value.trim();
        const i = document.getElementById('field_imei').value.trim();
        const ready = state.photo1Done && state.photo2Done && n && s && i;
        document.getElementById('submitBtn').disabled = !ready;
        if (ready) setStatus(3, 'pending');
    }

    // 手動輸入時也觸發檢查
    ['field_number', 'field_model', 'field_sn', 'field_imei'].forEach(function(id) {
        document.getElementById(id).addEventListener('input', checkSubmitReady);
    });

    // 提交資料
    async function submitData() {
        if (state.isSubmitting) return;
        state.isSubmitting = true;

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ 傳送中...';
        setStatus(3, 'processing');
        setProgress(3, 'active');

        const now = new Date();
        const timestamp = now.getFullYear() + '/' +
            String(now.getMonth()+1).padStart(2,'0') + '/' +
            String(now.getDate()).padStart(2,'0') + ' ' +
            String(now.getHours()).padStart(2,'0') + ':' +
            String(now.getMinutes()).padStart(2,'0') + ':' +
            String(now.getSeconds()).padStart(2,'0');

        const payload = {
            timestamp: timestamp,
            number: document.getElementById('field_number').value.trim(),
            model: document.getElementById('field_model').value.trim(),
            sn: document.getElementById('field_sn').value.trim(),
            imei: document.getElementById('field_imei').value.trim()
        };

        if (!payload.number || !payload.sn || !payload.imei) {
            showToast('請確認編號、SN、IMEI 均已填寫', 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✅ 傳送資料至 Google Sheets';
            setStatus(3, 'error');
            state.isSubmitting = false;
            return;
        }

        try {
            if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEB_APP_URL') {
                throw new Error('尚未設定 GAS_URL，請參考 SETUP.md 完成設定');
            }

            await fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // no-cors 模式下無法讀取 response，視為成功
            showToast('✅ 資料已成功傳送！', 'success', 4000);
            setStatus(3, 'success');
            setProgress(3, 'done');

            setTimeout(function() { resetAll(); }, 3500);

        } catch (err) {
            console.error('提交錯誤：', err);
            showToast('傳送失敗：' + err.message, 'error', 5000);
            setStatus(3, 'error');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✅ 傳送資料至 Google Sheets';
        } finally {
            state.isSubmitting = false;
        }
    }

    // 清除照片
    function clearPhoto(photoKey) {
        const step = photoKey === 'photo1' ? 1 : 2;
        state[photoKey] = null;

        const preview = document.getElementById('preview' + step);
        preview.classList.remove('has-image');
        const icon = step === 1 ? '🏷️' : '📋';
        preview.innerHTML = '<div class="photo-placeholder"><div class="icon">' + icon + '</div><div>尚未拍攝</div></div>';

        document.getElementById('data' + step).classList.remove('visible');
        document.getElementById('loading' + step).classList.remove('active');
        setStatus(step, 'pending');
        setProgress(step, '');

        if (photoKey === 'photo1') {
            state.photo1Done = false;
            document.getElementById('field_number').value = '';
        } else {
            state.photo2Done = false;
            document.getElementById('field_model').value = '';
            document.getElementById('field_sn').value = '';
            document.getElementById('field_imei').value = '';
        }

        checkSubmitReady();
    }

    // 重置全部
    function resetAll() {
        clearPhoto('photo1');
        clearPhoto('photo2');
        setStatus(3, 'pending');
        setProgress(3, '');
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerHTML = '✅ 傳送資料至 Google Sheets';
        state.isSubmitting = false;
    }

    console.log('iPhone 標籤掃描系統已載入');
    </script>
</body>
</html>
